<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="presentation-frame" aria-label="Interactive research presentation">
      <div class="presentation-surface">
        <div class="top-progress" aria-hidden="true">
          <div id="progress-bar" class="top-progress-bar"></div>
        </div>

        <header class="top-chrome">
          <div class="chrome-left">RESEARCH PRESENTATION</div>
          <div class="chrome-right">
            Design <span>|</span> Analysis <span>|</span> <strong>Methodology</strong>
          </div>
        </header>

        <section id="slide-content" class="slide-content" aria-live="polite"></section>

        <nav class="presentation-nav" aria-label="Slide navigation">
          <button id="prev-btn" class="nav-btn nav-btn-ghost" aria-label="Previous slide">
            <span class="nav-icon">&#8592;</span>
          </button>

          <div class="slide-counter">
            <span id="current-slide">1</span>
            <span class="counter-divider">/</span>
            <span id="total-slides">10</span>
          </div>

          <button id="next-btn" class="nav-btn nav-btn-solid" aria-label="Next slide">
            <span class="nav-icon">&#8594;</span>
          </button>

          <div class="nav-separator" aria-hidden="true"></div>

          <button
            id="fullscreen-btn"
            class="nav-btn nav-btn-ghost"
            aria-label="Toggle fullscreen"
            title="Fullscreen (F)"
          >
            <span class="fullscreen-icon">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
        </nav>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="start.js"></script>
</body>
</html>
