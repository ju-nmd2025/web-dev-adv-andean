<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JkpgCity — Bars & Clubs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="banner">
    <span>jkpgcity</span>
  </nav>
  <img class="hero-img" src="img/bar-img.jpg" alt="dance again image">
  <h1>Bars & Clubs</h1>
  <div class="sort-wrapper">
    <button id="sort-toggle">Sort By ▼</button>
    <div class="controls" id="sort-box" style="display:none;">
      <label for="sort"></label>
      <select id="sort">
        <option value="name">Alphabet (A–Z)</option>
        <option value="district">District</option>
      </select>
    </div>
  </div>

<!-- ADD FORM -->
 <div id="add-form">
  <input id="input-name" placeholder="Name" />
  <input id="input-category" placeholder="Category" />
  <input id="input-address" placeholder="Address" />
  <input id="input-district" placeholder="District" />
  <input id="input-url" placeholder="Website URL" />
  <input id="input-image" placeholder="Image URL" />
  <button id="add-btn">Add Venue</button>
 </div>

  <div id="list"></div>
  <script src="start.js"></script>
</body>
</html>
